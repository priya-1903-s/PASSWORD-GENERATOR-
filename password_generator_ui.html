
<style>
h2.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.label{font-size:13px;color:var(--color-text-secondary);margin-bottom:6px;display:block}
.row{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;border-radius:var(--border-radius-md);font-weight:500;white-space:nowrap}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.toggle-row:last-child{border-bottom:none}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider-t{position:absolute;inset:0;background:var(--color-border-secondary);border-radius:10px;cursor:pointer;transition:background .2s}
.slider-t:before{content:"";position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.slider-t{background:#3C3489}
.toggle input:checked+.slider-t:before{transform:translateX(16px)}
.pwd-display{font-family:var(--font-mono);font-size:18px;font-weight:500;letter-spacing:0.04em;word-break:break-all;padding:1rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);min-height:56px;line-height:1.5;color:var(--color-text-primary)}
.bar-wrap{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;margin:8px 0 4px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s,background .4s}
.tip-list{font-size:12px;color:var(--color-text-secondary);margin:4px 0 0;min-height:16px}
#length-val{font-size:14px;font-weight:500;min-width:28px;text-align:right}
.action-btn{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-primary);transition:background .15s}
.action-btn:hover{background:var(--color-background-secondary)}
.gen-btn{background:#3C3489;color:#fff;border-color:#3C3489;font-size:14px;padding:8px 20px}
.gen-btn:hover{background:#26215C;border-color:#26215C}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hist-item{font-family:var(--font-mono);font-size:12px;padding:6px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);display:flex;justify-content:space-between;align-items:center;color:var(--color-text-secondary)}
.hist-badge{font-size:10px;padding:2px 7px;border-radius:var(--border-radius-md);font-weight:500}
</style>

<h2 class="sr-only">Interactive password generator with strength meter and history</h2>

<div style="padding:1rem 0">

<div class="card" style="margin-bottom:12px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <span style="font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px"><i class="ti ti-lock" aria-hidden="true" style="font-size:18px;color:#534AB7"></i> Password generator</span>
    <span id="strength-badge" class="badge" style="background:#EEEDFE;color:#3C3489">—</span>
  </div>

  <div class="pwd-display" id="pwd-out" style="margin-bottom:10px">Click generate →</div>

  <div class="bar-wrap"><div class="bar-fill" id="bar" style="width:0%;background:#534AB7"></div></div>
  <div class="tip-list" id="tips"></div>

  <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
    <button class="action-btn gen-btn" onclick="generate()"><i class="ti ti-refresh" aria-hidden="true"></i> Generate</button>
    <button class="action-btn" onclick="copyPwd()" id="copy-btn"><i class="ti ti-copy" aria-hidden="true"></i> Copy</button>
    <button class="action-btn" onclick="generateBulk()"><i class="ti ti-list" aria-hidden="true"></i> Generate 5</button>
  </div>
</div>

<div class="grid2" style="margin-bottom:12px">
  <div class="card">
    <span class="label"><i class="ti ti-adjustments-horizontal" aria-hidden="true" style="font-size:14px;vertical-align:-2px"></i> Length: <span id="length-val">12</span></span>
    <input type="range" min="4" max="64" value="12" id="length-slider" style="width:100%" oninput="document.getElementById('length-val').textContent=this.value">
  </div>
  <div class="card">
    <span class="label"><i class="ti ti-sparkles" aria-hidden="true" style="font-size:14px;vertical-align:-2px"></i> Quick presets</span>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button class="action-btn" style="font-size:12px;padding:4px 10px" onclick="preset(8,false,false,false)">PIN 6-digit</button>
      <button class="action-btn" style="font-size:12px;padding:4px 10px" onclick="preset(16,true,true,false)">Memorable (16)</button>
      <button class="action-btn" style="font-size:12px;padding:4px 10px" onclick="preset(32,true,true,true)">Max security (32)</button>
    </div>
  </div>
</div>

<div class="card" style="margin-bottom:12px">
  <span class="label" style="margin-bottom:10px"><i class="ti ti-category" aria-hidden="true" style="font-size:14px;vertical-align:-2px"></i> Character sets</span>
  <div class="toggle-row">
    <span style="font-size:14px">Uppercase <span style="color:var(--color-text-secondary);font-size:12px">A–Z</span></span>
    <label class="toggle"><input type="checkbox" id="uc" checked><span class="slider-t"></span></label>
  </div>
  <div class="toggle-row">
    <span style="font-size:14px">Lowercase <span style="color:var(--color-text-secondary);font-size:12px">a–z</span></span>
    <label class="toggle"><input type="checkbox" id="lc" checked><span class="slider-t"></span></label>
  </div>
  <div class="toggle-row">
    <span style="font-size:14px">Digits <span style="color:var(--color-text-secondary);font-size:12px">0–9</span></span>
    <label class="toggle"><input type="checkbox" id="dg" checked><span class="slider-t"></span></label>
  </div>
  <div class="toggle-row">
    <span style="font-size:14px">Symbols <span style="color:var(--color-text-secondary);font-size:12px">!@#$%…</span></span>
    <label class="toggle"><input type="checkbox" id="sy" checked><span class="slider-t"></span></label>
  </div>
  <div class="toggle-row">
    <span style="font-size:14px">Exclude ambiguous <span style="color:var(--color-text-secondary);font-size:12px">0 O l 1 I</span></span>
    <label class="toggle"><input type="checkbox" id="amb"><span class="slider-t"></span></label>
  </div>
</div>

<div class="card" id="history-card" style="display:none">
  <span class="label" style="margin-bottom:10px"><i class="ti ti-history" aria-hidden="true" style="font-size:14px;vertical-align:-2px"></i> Recent passwords</span>
  <div id="hist-list" style="display:flex;flex-direction:column;gap:6px"></div>
</div>

<div id="bulk-card" class="card" style="display:none;margin-top:12px">
  <span class="label" style="margin-bottom:10px"><i class="ti ti-list" aria-hidden="true" style="font-size:14px;vertical-align:-2px"></i> Bulk passwords</span>
  <div id="bulk-list" style="display:flex;flex-direction:column;gap:6px"></div>
</div>

</div>

<script>
const SYMBOLS="!@#$%^&*()-_=+[]{}|;:,.<>?";
const AMBIGUOUS="0O1lI";

function rng(){return crypto.getRandomValues(new Uint32Array(1))[0]/4294967295}

function pickChar(pool){return pool[Math.floor(rng()*pool.length)];}

function buildPool(uc,lc,dg,sy,amb){
  let p="",g=[];
  const f=s=>amb?s.split("").filter(c=>!AMBIGUOUS.includes(c)).join(""):s;
  if(lc){let c=f("abcdefghijklmnopqrstuvwxyz");p+=c;g.push(pickChar(c));}
  if(uc){let c=f("ABCDEFGHIJKLMNOPQRSTUVWXYZ");p+=c;g.push(pickChar(c));}
  if(dg){let c=f("0123456789");p+=c;g.push(pickChar(c));}
  if(sy){p+=SYMBOLS;g.push(pickChar(SYMBOLS));}
  return{pool:p,guaranteed:g};
}

function genOne(){
  const len=parseInt(document.getElementById("length-slider").value);
  const uc=document.getElementById("uc").checked;
  const lc=document.getElementById("lc").checked;
  const dg=document.getElementById("dg").checked;
  const sy=document.getElementById("sy").checked;
  const amb=document.getElementById("amb").checked;
  const{pool,guaranteed}=buildPool(uc,lc,dg,sy,amb);
  if(!pool)return null;
  const rem=len-guaranteed.length;
  let chars=[...guaranteed,...Array.from({length:Math.max(0,rem)},()=>pickChar(pool))];
  for(let i=chars.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[chars[i],chars[j]]=[chars[j],chars[i]];}
  return chars.join("");
}

function strength(pwd){
  if(!pwd)return{score:0,label:"—",bar:"#888",tips:[]};
  let s=0,tips=[];
  const l=pwd.length;
  if(l>=8)s+=10;if(l>=12)s+=15;if(l>=16)s+=15;if(l>=20)s+=10;
  if(l<8)tips.push("Use at least 8 characters");
  const hL=/[a-z]/.test(pwd),hU=/[A-Z]/.test(pwd),hD=/\d/.test(pwd),hS=/[^a-zA-Z0-9]/.test(pwd);
  if(hL)s+=10;if(hU)s+=10;if(hD)s+=10;if(hS)s+=15;
  if(!hU)tips.push("Add uppercase letters");
  if(!hD)tips.push("Include numbers");
  if(!hS)tips.push("Add special characters");
  if(new Set(pwd).size/l<0.5){s-=10;tips.push("Avoid repeating characters");}
  s=Math.max(0,Math.min(100,s));
  let label,bar,bg,col;
  if(s>=80){label="Very strong";bar="#0F6E56";bg="#E1F5EE";col="#085041";}
  else if(s>=60){label="Strong";bar="#1D9E75";bg="#9FE1CB";col="#04342C";}
  else if(s>=40){label="Moderate";bar="#BA7517";bg="#FAEEDA";col="#633806";}
  else if(s>=20){label="Weak";bar="#D85A30";bg="#FAECE7";col="#4A1B0C";}
  else{label="Very weak";bar="#E24B4A";bg="#FCEBEB";col="#501313";}
  return{score:s,label,bar,bg,col,tips};
}

const history=[];

function render(pwd){
  document.getElementById("pwd-out").textContent=pwd||"No character sets selected.";
  const st=pwd?strength(pwd):{score:0,label:"—",bar:"#888",bg:"#EEEDFE",col:"#3C3489",tips:[]};
  document.getElementById("bar").style.width=st.score+"%";
  document.getElementById("bar").style.background=st.bar;
  const badge=document.getElementById("strength-badge");
  badge.textContent=st.label+" ("+st.score+"/100)";
  badge.style.background=st.bg||"#EEEDFE";
  badge.style.color=st.col||"#3C3489";
  document.getElementById("tips").textContent=st.tips.length?"Tip: "+st.tips[0]:"";
  if(pwd){
    history.unshift({pwd,st});
    if(history.length>5)history.pop();
    renderHistory();
  }
}

function renderHistory(){
  const card=document.getElementById("history-card");
  const list=document.getElementById("hist-list");
  if(!history.length){card.style.display="none";return;}
  card.style.display="";
  list.innerHTML=history.map((h,i)=>`
    <div class="hist-item">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;color:var(--color-text-primary)">${h.pwd}</span>
      <span class="hist-badge" style="background:${h.st.bg};color:${h.st.col}">${h.st.label}</span>
    </div>`).join("");
}

function generate(){
  const p=genOne();
  render(p);
  document.getElementById("bulk-card").style.display="none";
}

function preset(len,sy,dg,pin){
  document.getElementById("length-slider").value=len;
  document.getElementById("length-val").textContent=len;
  if(pin){
    document.getElementById("uc").checked=false;
    document.getElementById("lc").checked=false;
    document.getElementById("dg").checked=true;
    document.getElementById("sy").checked=false;
  } else {
    document.getElementById("uc").checked=true;
    document.getElementById("lc").checked=true;
    document.getElementById("dg").checked=dg;
    document.getElementById("sy").checked=sy;
  }
  generate();
}

function copyPwd(){
  const txt=document.getElementById("pwd-out").textContent;
  if(!txt||txt==="Click generate →")return;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById("copy-btn");
    btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Copied';
    setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy" aria-hidden="true"></i> Copy';},1500);
  });
}

function generateBulk(){
  const bulk=Array.from({length:5},()=>genOne()).filter(Boolean);
  const card=document.getElementById("bulk-card");
  const list=document.getElementById("bulk-list");
  card.style.display="";
  list.innerHTML=bulk.map(p=>{
    const st=strength(p);
    return`<div class="hist-item">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;color:var(--color-text-primary)">${p}</span>
      <span class="hist-badge" style="background:${st.bg};color:${st.col}">${st.label}</span>
    </div>`;
  }).join("");
}
</script>
